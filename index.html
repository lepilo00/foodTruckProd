    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Kako poteka najem food trucka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Postopek je preprost: najprej oddajte povpraševanje preko našega obrazca ali nas pokličite. Preverili bomo razpoložljivost in vam poslali ponudbo. Po potrditvi rezervacije dogovorimo podrobnosti o dostavi ali prevzemu. Na dan dogodka poskrbimo za vse nastavitve, vi pa uživate v dogodku."
          }
        },
        {
          "@type": "Question",
          "name": "Ali je možen vikend najem?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Seveda! Vikend najem je naša najbolj priljubljena možnost. Vključuje najem od petka do nedelje (3 dni) po ugodni ceni 400 EUR. Ta paket je idealen za festivale, poroke in večdnevne dogodke."
          }
        },
        {
          "@type": "Question",
          "name": "Kako rezerviram termin?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Termin lahko rezervirate preko spletnega obrazca, po telefonu ali elektronski pošti. Priporočamo, da nas kontaktirate vsaj 2-4 tedne pred želenim datumom, še posebej za vikende in poletne mesece, ko je povpraševanje največje."
          }
        },
        {
          "@type": "Question",
          "name": "Ali je možna prilagoditev ponudbe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutno. Vsak dogodek je edinstven, zato prilagajamo ponudbo vašim potrebam. Možna je prilagoditev trajanja najema, dodatne opreme, dostavnih razdalj in drugih storitev. Kontaktirajte nas s podrobnostmi vašega dogodka za individualno ponudbo."
          }
        },
        {
          "@type": "Question",
          "name": "Kakšna oprema je vključena v najem?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Food truck je popolnoma opremljen s profesionalno kuhinjsko opremo: delovna površina, hladilnik, zamrzovalnik, električni priključki, osvetlitev in osnovna kuhinjska orodja. Za specifične potrebe lahko zagotovimo dodatno opremo."
          }
        },
        {
          "@type": "Question",
          "name": "Ali nudite dostavo food trucka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Da, ponujamo dostavo na lokacijo vašega dogodka. Pri vikend paketu je dostava do 50 km brezplačna, pri tedenskem paketu pa do 100 km. Za daljše razdalje zaračunamo kilometrino po dogovoru."
          }
        },
        {
          "@type": "Question",
          "name": "Kaj potrebujem za delovanje food trucka?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Za osnovno delovanje potrebujete električni priključek (230V). Če na lokaciji ni možnosti priklopa, lahko zagotovimo agregat za doplačilo. Priporočamo tudi raven teren in zadosten prostor za manevriranje vozila."
          }
        },
        {
          "@type": "Question",
          "name": "Kakšni so plačilni pogoji?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ob potrditvi rezervacije zahtevamo 30% predplačilo, preostali znesek pa poravnate najkasneje na dan prevzema oz. dostave. Sprejemamo plačilo z bančnim nakazilom ali gotovino."
          }
        }
      ]
    }
    </script>
